<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zstreszer | 404 Not Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  body {
    font-family: 'Inter', sans-serif;
    margin: 0;
    padding: 0;
    background: radial-gradient(circle at top left, #93c5fd, #e0f2fe);
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    color: #1e293b;
  }

  .card {
    background: white;
    padding: 1.2rem 1.4rem;
    border-radius: 16px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08), 0 0 10px #60a5fbaa;
    text-align: center;
    max-width: 280px;
    margin-top: -60px;
    animation: bounceIn 0.8s ease;
    border: 2px solid #3b82f6;
  }

  h1 {
    font-size: 2.5rem;
    color: #2563eb;
    margin: 0.5rem 0;
    text-shadow: 0 2px 4px rgba(59, 130, 246, 0.3);
  }

  p {
    font-size: 0.9rem;
    color: #475569;
    margin-bottom: 1.2rem;
  }

  a {
    text-decoration: none;
    padding: 0.5rem 1rem;
    background: linear-gradient(to right, #3b82f6, #60a5fa);
    color: white;
    border-radius: 8px;
    font-weight: 600;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  a:hover {
    transform: translateY(-3px);
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.5);
  }

  @keyframes bounceIn {
    0% { transform: scale(1.0); opacity: 0; }
    60% { transform: scale(1.05); opacity: 1; }
    100% { transform: scale(1); }
  }
</style>
</head>
<body>
  <div class="card">
    <h1>404</h1>
    <p>Oops! The page you're looking for doesn't exist in the Zstreszer universe.</p>
    <a href="/">Return to Dashboard</a>
  </div>
</body>
</html>
